name: Build Installer

on:
  push:
    tags:
      - 'v*'  # runs when you push a version tag like v1.0.0
  release:
    types: [created] # manually created release

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m venv venv-build
          venv-build\Scripts\activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          venv-build\Scripts\activate
          pyinstaller manr_pyinstaller.spec

      - name: Build installer with Inno Setup
        run: iscc manr_inno_setup.iss

      - name: Upload or create Github release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ${{ github.ref_name }} && \
          gh release upload ${{ github.ref_name }} Manr_Chat_Setup*.exe || \
          gh release create ${{ github.ref_name }} Manr_Chat_Setup*.exe --title "${{ github.ref_name }}" --generate-notes