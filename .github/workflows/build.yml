name: Build Installer

on:
  push:
    tags:
      - 'v*'  # runs when you push a version tag like v1.0.0

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller manr_pyinstaller.spec

      - name: Build installer with Inno Setup
        run: iscc manr_inno_setup.iss

      - name: Create GitHub release and upload installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} Manr_Chat_Setup*.exe --title "${{ github.ref_name }}" --generate-notes